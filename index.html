<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>香港公眾假期查詢系統</title>
    <style>
      :root {
        --ha-blue: #0056b3;
        --holiday-red: #d93025;
        --bg-color: #f8f9fa;
      }
      body {
        font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: var(--ha-blue);
        text-align: center;
        border-bottom: 2px solid #eee;
        padding-bottom: 15px;
      }
      .description {
        color: #666;
        font-size: 0.9em;
        margin-bottom: 25px;
        line-height: 1.6;
      }

      /* 假期列表樣式 */
      .holiday-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
      }
      .holiday-card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 15px;
        transition: transform 0.2s;
        background: #fff;
        border-left: 6px solid var(--holiday-red);
      }
      .holiday-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .holiday-date {
        font-weight: bold;
        color: #555;
        font-size: 1.1em;
      }
      .holiday-name {
        color: #222;
        font-size: 1.2em;
        margin-top: 5px;
      }

      /* 狀態提示 */
      #status {
        text-align: center;
        padding: 20px;
        font-style: italic;
        color: #888;
      }
      .error {
        color: var(--holiday-red);
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🇭🇰 香港公眾假期 (2024-2026)</h1>
      <div class="description">
        數據來源：香港政府 1823 開放數據。<br />
        本網頁自動列出憲報刊登的公眾假期。若假期適逢星期日，將自動顯示翌日補假。
      </div>

      <div id="status">正在從 1823.gov.hk 獲取最新假期資訊...</div>
      <div id="holidayList" class="holiday-grid"></div>
    </div>

    <script>
      async function fetchHolidays() {
        const listContainer = document.getElementById('holidayList');
        const statusText = document.getElementById('status');

        // 原始 1823 JSON 網址
        const targetUrl = 'https://www.1823.gov.hk/common/ical/tc.json';
        // 使用代理服務繞過 CORS 限制
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(
          targetUrl
        )}`;

        try {
          const response = await fetch(proxyUrl);
          if (!response.ok) throw new Error('連線失敗');

          const wrapper = await response.json();
          const data = JSON.parse(wrapper.contents); // 1823 的 JSON 內容

          // 根據數據字典，資料儲存在 vcalendar[0].vevent 陣列中
          const holidays = data.vcalendar[0].vevent;

          statusText.style.display = 'none';
          listContainer.innerHTML = '';

          holidays.forEach((event) => {
            // 解析 dtstart (格式: YYYYMMDD)
            const rawDate = event.dtstart[0];
            const year = rawDate.substring(0, 4);
            const month = rawDate.substring(4, 6);
            const day = rawDate.substring(6, 8);

            // 假期名稱存放在 summary 欄位
            const holidayName = event.summary;

            const card = document.createElement('div');
            card.className = 'holiday-card';
            card.innerHTML = `
                    <div class="holiday-date">${year}年${month}月${day}日</div>
                    <div class="holiday-name">${holidayName}</div>
                `;
            listContainer.appendChild(card);
          });
        } catch (error) {
          statusText.innerHTML = `<span class="error">載入出錯：${error.message}<br>請檢查網路連線或稍後再試。</span>`;
        }
      }

      // 啟動程式
      window.onload = fetchHolidays;
    </script>
  </body>
</html>
